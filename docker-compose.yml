x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    container_name: atelier-postgres
    restart: unless-stopped
    env_file:
      - deploy/.env.production
    environment:
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app
    logging: *default-logging

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: atelier-backend
    restart: unless-stopped
    env_file:
      - deploy/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ${STORAGE_HOST_PATH:-./storage}:/app/storage
    networks:
      - app
    logging: *default-logging

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: atelier-nginx
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ${LETSENCRYPT_ROOT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ${CERTBOT_WEBROOT_HOST_PATH}:/var/www/certbot:ro
    networks:
      - app
    logging: *default-logging

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: atelier-uptime-kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - app
    logging: *default-logging

volumes:
  pgdata:
  uptime_kuma_data:

networks:
  app:
    driver: bridge
