x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - deploy/.env.staging
    environment:
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    networks:
      - app
    logging: *default-logging

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - deploy/.env.staging
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-3100}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ${STAGING_STORAGE_HOST_PATH:-/opt/atelier_backend_staging/storage}:/app/storage
    networks:
      - app
    logging: *default-logging

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    env_file:
      - deploy/.env.staging
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${STAGING_HTTP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./deploy/nginx.staging.conf:/etc/nginx/templates/default.conf.template:ro
    networks:
      - app
    logging: *default-logging

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT:-3002}:3001"
    volumes:
      - uptime_kuma_data_staging:/app/data
    networks:
      - app
    logging: *default-logging

volumes:
  pgdata_staging:
  uptime_kuma_data_staging:

networks:
  app:
    driver: bridge
