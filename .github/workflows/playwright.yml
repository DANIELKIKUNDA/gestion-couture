# CI/CD staging pipeline for AtelierPro.
name: Staging Validation & Deploy

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - staging
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: atelier
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d atelier"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: "true"
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: atelier
      PORT: 3000
      AUTH_JWT_SECRET: ci-jwt-secret
      AUTH_JWT_TTL_SECONDS: 86400
      AUTH_REFRESH_TTL_SECONDS: 31536000
      AUTH_REFRESH_COOKIE_NAME: atelier_refresh_token
      AUTH_COOKIE_SAMESITE: lax
      AUTH_COOKIE_SECURE: "false"
      MEDIA_STORAGE_ROOT: .tmp/storage
      MEDIA_TEMP_ROOT: .tmp/storage/tmp
      BASE_URL: http://127.0.0.1:5173
      API_URL: http://127.0.0.1:3000
      PLAYWRIGHT_HEADLESS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Prepare media directories
        run: mkdir -p .tmp/storage/tmp

      - name: Initialize database schema
        run: psql -v ON_ERROR_STOP=1 -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -f schema_all.sql

      - name: Apply migrations
        run: |
          for file in scripts/migrations/*.sql; do
            echo "[migrations] Applying $file"
            psql -v ON_ERROR_STOP=1 -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -f "$file"
          done

      - name: Verify auth schema
        run: |
          psql -v ON_ERROR_STOP=1 -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" <<'SQL'
          DO $$
          BEGIN
            IF to_regclass('public.utilisateurs') IS NULL THEN
              RAISE EXCEPTION 'Table public.utilisateurs absente apres migrations';
            END IF;
            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'utilisateurs'
                AND column_name = 'id_utilisateur'
            ) THEN
              RAISE EXCEPTION 'Colonne utilisateurs.id_utilisateur absente';
            END IF;
            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'utilisateurs'
                AND column_name = 'mot_de_passe_hash'
            ) THEN
              RAISE EXCEPTION 'Colonne utilisateurs.mot_de_passe_hash absente';
            END IF;
            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'utilisateurs'
                AND column_name = 'atelier_id'
            ) THEN
              RAISE EXCEPTION 'Colonne utilisateurs.atelier_id absente';
            END IF;
            IF NOT EXISTS (
              SELECT 1
              FROM pg_index i
              JOIN pg_class t ON t.oid = i.indrelid
              JOIN pg_namespace n ON n.oid = t.relnamespace
              JOIN pg_attribute a ON a.attrelid = t.oid AND a.attnum = ANY(i.indkey)
              WHERE n.nspname = 'public'
                AND t.relname = 'utilisateurs'
                AND i.indisunique = true
                AND array_length(i.indkey, 1) = 1
                AND a.attname = 'id_utilisateur'
            ) THEN
              RAISE EXCEPTION 'Contrainte unique manquante sur utilisateurs.id_utilisateur';
            END IF;
          END
          $$;
          SQL

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Run local-equivalent validation
        run: npm run validate:local

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    permissions:
      contents: read
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT:-22}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" \
            "APP_DIR='${STAGING_APP_DIR:-/opt/atelier_backend_staging/app}' DEPLOY_REF='staging' bash -s" \
            < deploy/deploy-staging.sh
